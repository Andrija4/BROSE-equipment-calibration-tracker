{% extends "base.html" %}

{% block content %}
{% if error %}
<div style="background-color: #f8d7da; color: #721c24; padding: 12px; margin-bottom: 20px; border: 1px solid #f5c6cb; border-radius: 4px;">
    <strong>Error:</strong> {{ error }}
</div>
{% endif %}

<form method="POST" action="/update/{{ equipment.id }}">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" value="{{ equipment.name }}" required><br><br>

    <label for="brose_sap">Brose SAP Number:</label>
    <input type="text" id="brose_sap" name="brose_sap" value="{{ equipment.brose_sap }}" required><br><br>

    <label for="serial_number">Serial Number:</label>
    <input type="text" id="serial_number" name="serial_number" value="{{ equipment.serial_number }}" required><br><br>

    <label for="location">Location:</label>
    <input type="text" id="location" name="location" value="{{ equipment.location }}" required><br><br>

    <label for="responsible_person">Responsible Person:</label>
    <input type="text" id="responsible_person" name="responsible_person" value="{{ equipment.responsible_person }}"><br><br>

    <label for="last_calibration">Last Calibration Date:</label>
    <input type="date" id="last_calibration" name="last_calibration" value="{{ equipment.last_calibration }}" required><br><br>

    <label for="interval_days">Interval (days):</label>
    <input type="number" id="interval_days" name="interval_days" value="{{ equipment.interval_days }}" required min="1"><br><br>

    <label for="calibration_location">Calibration Location:</label>
    <select id="calibration_location" name="calibration_location" required>
        <option value="EX" {% if equipment.calibration_location == 'EX' %}selected{% endif %}>External</option>
        <option value="IN" {% if equipment.calibration_location == 'IN' %}selected{% endif %}>Internal</option>
    </select><br><br>

    <label for="calibration_provider">Calibration Provider:</label>
    <input type="text" id="calibration_provider" name="calibration_provider" value="{{ equipment.calibration_provider }}"><br><br>

    <label for="calibration_price">Calibration Price (€):</label>
    <input type="number" step="0.01" id="calibration_price" name="calibration_price" value="{{ equipment.calibration_price }}"><br><br>

    <button type="submit">Update Equipment</button>
</form>
{% endblock %}
